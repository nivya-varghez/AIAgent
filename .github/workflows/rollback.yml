name: Rollback Deployment
run-name: Rollback ${{ inputs.app_name || github.event.inputs.app_name }} in ${{ inputs.environment || github.event.inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Application identifier
        required: true
        type: string
      environment:
        description: Target environment
        required: true
        type: string
      image_repository:
        description: Container image repository
        required: false
        default: ''
        type: string
      previous_version:
        description: Version to restore (optional if using rollout undo)
        required: false
        default: ''
        type: string
      incident_reference:
        description: Incident or change reference
        required: false
        default: ''
        type: string
      rollback_command:
        description: Optional custom rollback command
        required: false
        default: ''
        type: string
      rollback_mode:
        description: Rollback mode->undo or set_image
        required: false
        default: "undo"
        type: string
      k8s_namespace:
        description: Kubernetes namespace (defaults to environment)
        required: false
        default: ''
        type: string
      deployment_name:
        description: Kubernetes deployment name (defaults to app_name)
        required: false
        default: ''
        type: string
      container_name:
        description: Container name in deployment (defaults to app_name)
        required: false
        default: ''
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || github.event.inputs.environment }}
    env:
      APP_NAME: ${{ inputs.app_name || github.event.inputs.app_name }}
      ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment }}
      PREVIOUS_VERSION: ${{ inputs.previous_version || github.event.inputs.previous_version }}
      INCIDENT_REFERENCE: ${{ inputs.incident_reference || github.event.inputs.incident_reference }}
      ROLLBACK_COMMAND: ${{ inputs.rollback_command || github.event.inputs.rollback_command }}
      ROLLBACK_MODE: ${{ inputs.rollback_mode || github.event.inputs.rollback_mode }}
      K8S_NAMESPACE_INPUT: ${{ inputs.k8s_namespace || github.event.inputs.k8s_namespace }}
      DEPLOYMENT_NAME_INPUT: ${{ inputs.deployment_name || github.event.inputs.deployment_name }}
      CONTAINER_NAME_INPUT: ${{ inputs.container_name || github.event.inputs.container_name }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
      AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve Kubernetes target
        id: k8s
        shell: bash
        run: |
          namespace="$K8S_NAMESPACE_INPUT"
          if [ -z "$namespace" ]; then
            namespace="$(echo "$ENVIRONMENT" | tr '[:upper:]' '[:lower:]')"
            if [ "$namespace" = "production" ]; then
              namespace="prod"
            fi
          fi

          deployment_name="$DEPLOYMENT_NAME_INPUT"
          if [ -z "$deployment_name" ]; then
            deployment_name="$APP_NAME"
          fi

          container_name="$CONTAINER_NAME_INPUT"
          if [ -z "$container_name" ]; then
            container_name="$APP_NAME"
          fi

          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "deployment_name=$deployment_name" >> "$GITHUB_OUTPUT"
          echo "container_name=$container_name" >> "$GITHUB_OUTPUT"

      - name: Resolve image repository
        id: image
        shell: bash
        run: |
          value="${{ inputs.image_repository || github.event.inputs.image_repository }}"
          if [ -z "$value" ]; then
            if [ -z "$ACR_LOGIN_SERVER" ]; then
              echo "Missing required secret ACR_LOGIN_SERVER"
              exit 1
            fi
            value="$ACR_LOGIN_SERVER/$APP_NAME"
          elif [[ "$value" != */* ]]; then
            if [ -z "$ACR_LOGIN_SERVER" ]; then
              echo "ACR_LOGIN_SERVER secret is required when image_repository has no registry"
              exit 1
            fi
            value="$ACR_LOGIN_SERVER/$value"
          fi
          value="$(echo "$value" | tr '[:upper:]' '[:lower:]')"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        shell: bash
        run: |
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "Missing required secret ACR_LOGIN_SERVER"
            exit 1
          fi
          az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        shell: bash
        run: |
          if [ -z "$AKS_CLUSTER_NAME" ] || [ -z "$AKS_RESOURCE_GROUP" ]; then
            echo "Missing required AKS_CLUSTER_NAME or AKS_RESOURCE_GROUP secret"
            exit 1
          fi
          az aks get-credentials --resource-group "$AKS_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --overwrite-existing

      - name: Capture rollback request
        run: |
          python scripts/deployment_ops.py rollback \
            --app-name "$APP_NAME" \
            --environment "$ENVIRONMENT" \
            --image-repository "${{ steps.image.outputs.value }}" \
            --previous-version "${PREVIOUS_VERSION:-auto}" \
            --incident-reference "$INCIDENT_REFERENCE" \
            --rollback-command "$ROLLBACK_COMMAND" \
            --requested-by "${{ github.actor }}"

      - name: Run default rollback command
        if: env.ROLLBACK_COMMAND == ''
        shell: bash
        run: |
          mode="$(echo "$ROLLBACK_MODE" | tr '[:upper:]' '[:lower:]')"
          if [ "$mode" = "set_image" ] || [ -n "$PREVIOUS_VERSION" ]; then
            if [ -z "$PREVIOUS_VERSION" ]; then
              echo "previous_version is required when rollback_mode=set_image"
              exit 1
            fi
            image="${{ steps.image.outputs.value }}:$PREVIOUS_VERSION"
            kubectl set image deployment/${{ steps.k8s.outputs.deployment_name }} \
              ${{ steps.k8s.outputs.container_name }}="$image" \
              -n "${{ steps.k8s.outputs.namespace }}"
          else
            kubectl rollout undo deployment/${{ steps.k8s.outputs.deployment_name }} \
              -n "${{ steps.k8s.outputs.namespace }}"
          fi
          kubectl rollout status deployment/${{ steps.k8s.outputs.deployment_name }} \
            -n "${{ steps.k8s.outputs.namespace }}" \
            --timeout=180s

      - name: Show rollback command summary
        run: |
          echo "Rollback app $APP_NAME in $ENVIRONMENT"
          echo "Rollback mode: $ROLLBACK_MODE"
          echo "Explicit previous version: ${PREVIOUS_VERSION:-none}"
          echo "kubectl rollout undo deployment/${{ steps.k8s.outputs.deployment_name }} -n ${{ steps.k8s.outputs.namespace }}"
          echo "kubectl set image deployment/${{ steps.k8s.outputs.deployment_name }} ${{ steps.k8s.outputs.container_name }}=${{ steps.image.outputs.value }}:${PREVIOUS_VERSION:-<version>} -n ${{ steps.k8s.outputs.namespace }}"

      - name: Run custom rollback command
        if: env.ROLLBACK_COMMAND != ''
        shell: bash
        run: |
          eval "$ROLLBACK_COMMAND"

      - name: Upload rollback manifest
        uses: actions/upload-artifact@v4
        with:
          name: rollback-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}
          path: deployment_state/*.json